name: Deploy

on:
  push:
  workflow_dispatch:

jobs:
  my-job:
    runs-on: ubuntu-latest
    env:
      # SET THESE
      ACR_ADMIN_USERNAME: "funnyapp"
      ACR_LOGIN_SERVER_URL: "funnyapp.azurecr.io"

      # SET THIS IN GITHUB
      ACR_ADMIN_PASSWORD: ${{ secrets.ACR_ADMIN_PASSWORD }}

    # Only run on your fork, not the original workshop repo
    if: github.repository != 'corndeladmin/DevOps-Unit-10-Workshop'

    steps:
      - name: test
        run: echo ${{ github.repository }}

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build image
        run: docker build --tag ${ACR_LOGIN_SERVER_URL}/monitoring_workshop/unit-10-order-processing-app:latest --target production .

      - name: Docker login
        run: echo $ACR_ADMIN_PASSWORD | docker login -u $ACR_ADMIN_USERNAME --password-stdin ${ACR_LOGIN_SERVER_URL}

      - name: Push image
        run: docker push ${ACR_LOGIN_SERVER_URL}/monitoring_workshop/unit-10-order-processing-app:latest